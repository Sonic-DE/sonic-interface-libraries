    <text id="text1204" x="118" y="1.9579086" fill="#000000" font-family="'Noto Sans'" font-size="1.25217px" stroke-linecap="round" stroke-width="5.72866" xml:space="preserve"><tspan id="tspan1202" x="118" y="1.9579086">The corners of the mask are 1px  smaller because they</tspan><tspan id="tspan1358" x="118" y="3.6373291">are not antialiased, whereas the svg corners are; if the</tspan><tspan id="tspan1360" x="118" y="5.3167458">mask is the same size of the svg, then, some of the corner</tspan><tspan id="tspan1362" x="118" y="6.9961662">pixels of the mask will be visible even though they should</tspan><tspan id="tspan1364" x="118" y="8.6755867">be covered by the svg.</tspan></text>
